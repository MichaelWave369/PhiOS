name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check phios/
      - name: Mypy
        run: mypy phios/ --ignore-missing-imports
      - name: Run tests
        run: pytest -q
      - name: Enforce no telemetry policy
        run: bash scripts/policy_no_telemetry_runtime.sh
