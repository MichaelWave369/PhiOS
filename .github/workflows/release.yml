name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check phios/
      - run: mypy phios/ --ignore-missing-imports
      - run: pytest -q
      - run: bash scripts/policy_no_telemetry_runtime.sh

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  release-notes:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      release_notes: ${{ steps.notes.outputs.release_notes }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - id: version
        shell: bash
        run: |
          echo "version=$(python -c 'from phios import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"
      - id: notes
        run: python scripts/generate_release_notes.py

  github-release:
    runs-on: ubuntu-latest
    needs: [build, publish-pypi, release-notes]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release-notes.outputs.version }}
          body: |
            ${{ needs.release-notes.outputs.release_notes }}

            Install:
            pip install phios==${{ needs.release-notes.outputs.version }}

            Manifesto: https://enterthefield.org/phios
            Hemavit attribution: TIEKAT v8.1 mathematical foundation by Hemavit.
          files: dist/*
