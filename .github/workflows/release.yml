name: Release

on:
  # Manual release trigger (for explicit operator-controlled releases).
  workflow_dispatch:
  # Automated release trigger only for version tags.
  push:
    tags:
      - "v*"

jobs:
  # Release pipeline keeps a test gate for tagged/manual releases as an additional safety net.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check phios/
      - name: Mypy
        run: mypy phios/ --ignore-missing-imports
      - name: Pytest
        run: pytest -q
      - name: Enforce no telemetry policy
        run: bash scripts/policy_no_telemetry_runtime.sh

  # Release workflow focuses on release responsibilities only:
  # build artifacts, publish to PyPI, and create GitHub release.
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Clean old build artifacts
        run: |
          rm -rf dist/ build/ ./*.egg-info
      - name: Build distribution artifacts
        run: python -m build
      - name: Verify distribution artifacts
        shell: bash
        run: |
          echo "dist contents:"
          ls -lah dist || true

          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)

          if (( ${#wheels[@]} == 0 && ${#sdists[@]} == 0 )); then
            echo "ERROR: No valid Python distribution artifacts were produced."
            exit 1
          fi

          for f in dist/*; do
            case "$f" in
              *.whl|*.tar.gz) ;;
              *)
                echo "ERROR: Unexpected file in dist/: $f"
                exit 1
                ;;
            esac
          done
      - uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz

  release-notes:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      release_notes: ${{ steps.notes.outputs.release_notes }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package for version inspection
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - id: version
        shell: bash
        run: |
          echo "version=$(python -c 'from phios import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"
      - id: tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${TAG#v}"
            if [[ "${TAG_VERSION}" != "${VERSION}" ]]; then
              echo "Tag/version mismatch: tag=${TAG} package_version=${VERSION}" >&2
              exit 1
            fi
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: use package version to construct tag.
            echo "release_tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi
      - id: notes
        run: python scripts/generate_release_notes.py

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build, release-notes]
    # Required for Trusted Publishing (OIDC) on PyPI.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs: [build, publish-pypi, release-notes]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-notes.outputs.release_tag }}
          body: |
            ${{ needs.release-notes.outputs.release_notes }}

            Install:
            pip install phios==${{ needs.release-notes.outputs.version }}

            Manifesto: https://enterthefield.org/phios
            Hemavit attribution: TIEKAT v8.1 mathematical foundation by Hemavit.
          files: |
            dist/*.whl
            dist/*.tar.gz
