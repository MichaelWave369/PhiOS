<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>PhiOS Atlas Gallery</title>
<style>body{font-family:system-ui;background:#0b1221;color:#eaf0ff;padding:1rem}.card{border:1px solid #334;background:#121c34;border-radius:10px;padding:.8rem;margin:.6rem 0}pre{white-space:pre-wrap;word-break:break-word;font-size:.85rem}.muted{color:#b6c0e0}</style>
</head><body><h1>Atlas Gallery (Experimental)</h1><div id="app"></div>
<script>
const model=__PHIOS_ATLAS_GALLERY_MODEL_JSON__;
const app=document.getElementById('app');
app.innerHTML=`<div class="card"><h2>Framing</h2><p class="muted">Theoretical C*=${model.framing.c_star_theoretical}; bio target=${model.framing.bio_target} (${model.framing.bio_status}); Hunter's C=${model.framing.hunter_c_status}. Atlas gallery is local interpretive curation only.</p></div>
<div class="card"><h3>Filters</h3><pre>${JSON.stringify(model.filters,null,2)}</pre></div>
<div class="card"><h3>Sector Snapshot</h3><pre>${JSON.stringify(model.sector_snapshot,null,2)}</pre></div>
<div class="card"><h3>Entries</h3><pre>${JSON.stringify(model.entries,null,2)}</pre></div>`;
</script></body></html>
