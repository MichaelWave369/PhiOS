<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PhiOS Golden Atlas</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#0a1020;color:#e8ecff;margin:0;padding:1rem}
    .card{border:1px solid #334;background:#141d35;border-radius:10px;padding:.8rem;margin:.6rem 0}
    .muted{color:#aab4db}
    pre{white-space:pre-wrap;word-break:break-word;font-size:.85rem}
  </style>
</head>
<body>
<h1>Golden Atlas (Experimental)</h1>
<div id="app"></div>
<script>
const model = __PHIOS_ATLAS_MAP_MODEL_JSON__;
const el = document.getElementById('app');
el.innerHTML = `
<div class="card">
  <h2>Framing</h2>
  <p class="muted">Theoretical attractor C*=${model.constants.c_star_theoretical}. Experimental bio band=[${model.constants.bio_band_low}, ${model.constants.bio_band_high}] target=${model.constants.bio_target}. Hunter's C remains ${model.constants.hunter_c_status}.</p>
  <p class="muted">Golden Atlas is optional experimental local navigation guidance, not core truth logic.</p>
</div>
<div class="card"><h3>Route</h3><pre>${JSON.stringify({target_mode:model.target_mode,start_idx:model.start_idx,target_idx:model.target_idx,route_length:model.route_length,route_cost:model.route_cost},null,2)}</pre></div>
<div class="card"><h3>Heat</h3><pre>${JSON.stringify({heat_mode:model.heat_mode,heat_summary:model.heat_summary},null,2)}</pre></div>
<div class="card"><h3>Path steps</h3><pre>${JSON.stringify(model.route_nodes,null,2)}</pre></div>
`;
</script>
</body>
</html>
