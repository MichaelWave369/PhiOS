<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhiOS Visual Bloom Gallery</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #05070c; color: #dfe7f4; }
      .wrap { padding: 16px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
      .card { border: 1px solid rgba(201,168,76,0.35); border-radius: 10px; background: rgba(10,12,18,0.72); padding: 10px; }
      .title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
      .line { font-size: 12px; opacity: 0.9; margin: 2px 0; }
      .controls { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin: 10px 0; }
      input, select { width: 100%; background: #0d1320; color: #dfe7f4; border: 1px solid rgba(201,168,76,0.35); border-radius: 6px; padding: 6px; }
      h2 { margin: 8px 0; }
    </style>
  </head>
  <body>
    <div class="wrap" id="app"></div>
    <script>
      const model = __PHIOS_GALLERY_MODEL_JSON__;
      const app = document.getElementById("app");
      const sessions = model.sessions || [];
      const compares = model.compare_sets || [];

      function safe(v) { return (v ?? "").toString(); }
      function passes(s, query, mode, preset, lens, audio) {
        if (mode && safe(s.mode).toLowerCase() !== mode) return false;
        if (preset && safe(s.preset).toLowerCase() !== preset) return false;
        if (lens && safe(s.lens).toLowerCase() !== lens) return false;
        if (audio && safe(s.audio).toLowerCase() !== audio) return false;
        if (!query) return true;
        const blob = [s.session_id, s.label, s.collection, s.mode, s.preset, s.lens, s.audio, s.created_at, s.updated_at, s.latest_timestamp].map(safe).join(" ").toLowerCase();
        return blob.includes(query);
      }
      function cardSession(s) {
        const p = s.preview || {};
        return `<div class="card">
          <div class="title">${safe(s.session_id) || "session"}</div>
          <div class="line">label: ${safe(s.label)}</div>
          <div class="line">collection: ${safe(s.collection)}</div>
          <div class="line">mode: ${safe(s.mode)}</div>
          <div class="line">preset/lens: ${safe(s.preset||"none")}/${safe(s.lens||"none")}</div>
          <div class="line">audio: ${safe(s.audio || "off")}</div>
          <div class="line">created: ${safe(s.created_at)}</div>
          <div class="line">updated: ${safe(s.updated_at)}</div>
          <div class="line">latest: ${safe(s.latest_timestamp)}</div>
          <div class="line">preview: ${safe(p.preview_status || "unknown")} (${safe(p.preview_type || "metadata")})</div>
        </div>`;
      }

      function cardCompare(c) {
        return `<div class="card">
          <div class="title">${safe(c.name) || "compare"}</div>
          <div class="line">label: ${safe(c.label)}</div>
          <div class="line">left: ${safe(c.left_ref)}</div>
          <div class="line">right: ${safe(c.right_ref)}</div>
          <div class="line">created: ${safe(c.created_at)}</div>
          <div class="line">report: ${safe(c.latest_report_path)}</div>
          <div class="line">bundle: ${safe(c.latest_bundle_path)}</div>
        </div>`;
      }

      function render() {
        const query = safe(document.getElementById("q").value).trim().toLowerCase();
        const mode = safe(document.getElementById("mode").value).trim().toLowerCase();
        const preset = safe(document.getElementById("preset").value).trim().toLowerCase();
        const lens = safe(document.getElementById("lens").value).trim().toLowerCase();
        const audio = safe(document.getElementById("audio").value).trim().toLowerCase();

        const filtered = sessions.filter(s => passes(s, query, mode, preset, lens, audio));
        document.getElementById("session-grid").innerHTML = filtered.map(cardSession).join("");
        document.getElementById("session-count").textContent = `${filtered.length}/${sessions.length}`;
        document.getElementById("compare-grid").innerHTML = compares.map(cardCompare).join("");
      }

      app.innerHTML = `
        <h2>Φ Visual Bloom Gallery</h2>
        <div class="line">generated: ${safe(model.generated_at)} · collection: ${safe(model.collection || "all")} · sessions: <span id="session-count">${sessions.length}/${sessions.length}</span> · compare sets: ${safe(model.compare_set_count || 0)}</div>
        <div class="controls">
          <input id="q" placeholder="search text" value="${safe(model.search || "")}" />
          <select id="mode"><option value="">mode:any</option><option>snapshot</option><option>live</option><option>replay</option></select>
          <select id="preset"><option value="">preset:any</option><option>none</option><option>stable</option><option>ritual</option><option>diagnostic</option><option>bloom</option></select>
          <select id="lens"><option value="">lens:any</option><option>none</option><option>stable</option><option>ritual</option><option>diagnostic</option><option>bloom</option></select>
          <select id="audio"><option value="">audio:any</option><option>on</option><option>off</option></select>
        </div>
        <h2>Sessions</h2>
        <div class="grid" id="session-grid"></div>
        <h2>Saved Compare Sets</h2>
        <div class="grid" id="compare-grid"></div>
      `;
      ["q", "mode", "preset", "lens", "audio"].forEach((id) => document.getElementById(id).addEventListener("input", render));
      render();
    </script>
  </body>
</html>
