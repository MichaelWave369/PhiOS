<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PhiOS Visual Bloom Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#0b1020; color:#e6ebff; margin:0; padding:1.2rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; }
    .card { border:1px solid #334; border-radius:10px; padding:0.9rem; background:#121a31; }
    .muted { color:#a8b2d7; }
    pre { white-space:pre-wrap; word-break:break-word; font-size:0.85rem; }
  </style>
</head>
<body>
  <h1>PhiOS Visual Bloom Dashboard</h1>
  <div id="app"></div>
<script>
const model = __PHIOS_DASHBOARD_MODEL_JSON__;
const app = document.getElementById('app');
app.innerHTML = `
<div class="card">
  <h2>Scientific framing</h2>
  <p class="muted">Theoretical C* = (1 + sqrt(5)) / 4 = ${model.bio_banner.c_star_theoretical} (${model.bio_banner.c_star_theoretical_trig_equiv}).</p>
  <p class="muted">Bio target ${model.bio_banner.bio_target} is <b>${model.bio_banner.bio_status}</b>; Hunter's C is <b>${model.bio_banner.hunter_c_status}</b>; provenance: ${model.bio_banner.model_provenance}.</p>
</div>
<div class="grid">
  <div class="card"><h3>Recent sessions</h3><pre>${JSON.stringify(model.sessions, null, 2)}</pre></div>
  <div class="card"><h3>Recent compare sets</h3><pre>${JSON.stringify(model.compares, null, 2)}</pre></div>
  <div class="card"><h3>Pathways</h3><pre>${JSON.stringify(model.pathways, null, 2)}</pre></div>
  <div class="card"><h3>Constellations</h3><pre>${JSON.stringify(model.constellations, null, 2)}</pre></div>
  <div class="card"><h3>Experimental recommendations</h3><pre>${JSON.stringify(model.recommendations, null, 2)}</pre></div>
  <div class="card"><h3>Sector summary</h3><pre>${JSON.stringify(model.sector_summary, null, 2)}</pre></div>
  <div class="card"><h3>Diagnostics snapshot</h3><pre>${JSON.stringify(model.diagnostics_snapshot, null, 2)}</pre></div>
  <div class="card"><h3>Recent route compares</h3><pre>${JSON.stringify(model.recent_route_compares, null, 2)}</pre></div>
  <div class="card"><h3>Recent storyboards</h3><pre>${JSON.stringify(model.recent_storyboards, null, 2)}</pre></div>
  <div class="card"><h3>Recent dossiers</h3><pre>${JSON.stringify(model.recent_dossiers, null, 2)}</pre></div>
  <div class="card"><h3>Dossier summary counts</h3><pre>${JSON.stringify(model.dossier_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent field libraries</h3><pre>${JSON.stringify(model.recent_field_libraries, null, 2)}</pre></div>
  <div class="card"><h3>Field library summary counts</h3><pre>${JSON.stringify(model.field_library_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent shelves</h3><pre>${JSON.stringify(model.recent_shelves, null, 2)}</pre></div>
  <div class="card"><h3>Recent reading rooms</h3><pre>${JSON.stringify(model.recent_reading_rooms, null, 2)}</pre></div>
  <div class="card"><h3>Reading room summary counts</h3><pre>${JSON.stringify(model.reading_room_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent collection maps</h3><pre>${JSON.stringify(model.recent_collection_maps, null, 2)}</pre></div>
  <div class="card"><h3>Collection map node/edge counts</h3><pre>${JSON.stringify(model.collection_map_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent study halls</h3><pre>${JSON.stringify(model.recent_study_halls, null, 2)}</pre></div>
  <div class="card"><h3>Study hall summary counts</h3><pre>${JSON.stringify(model.study_hall_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent thematic pathways</h3><pre>${JSON.stringify(model.recent_thematic_pathways, null, 2)}</pre></div>
  <div class="card"><h3>Thematic pathway node/link counts</h3><pre>${JSON.stringify(model.thematic_pathway_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent curricula</h3><pre>${JSON.stringify(model.recent_curricula, null, 2)}</pre></div>
  <div class="card"><h3>Curriculum summary counts</h3><pre>${JSON.stringify(model.curriculum_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent journey ensembles</h3><pre>${JSON.stringify(model.recent_journey_ensembles, null, 2)}</pre></div>
  <div class="card"><h3>Journey ensemble counts</h3><pre>${JSON.stringify(model.journey_ensemble_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent syllabi</h3><pre>${JSON.stringify(model.recent_syllabi, null, 2)}</pre></div>
  <div class="card"><h3>Syllabus summary counts</h3><pre>${JSON.stringify(model.syllabus_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Recent atlas cohorts</h3><pre>${JSON.stringify(model.recent_atlas_cohorts, null, 2)}</pre></div>
  <div class="card"><h3>Atlas cohort counts</h3><pre>${JSON.stringify(model.atlas_cohort_summary_counts, null, 2)}</pre></div>
  <div class="card"><h3>Latest curated programs</h3><pre>${JSON.stringify(model.latest_curated_entry_points, null, 2)}</pre></div>
  <div class="card"><h3>Recent catalog snapshots</h3><pre>${JSON.stringify(model.recent_catalog_snapshots, null, 2)}</pre></div>
  <div class="card"><h3>Catalog coverage counts</h3><pre>${JSON.stringify(model.catalog_coverage_counts, null, 2)}</pre></div>
  <div class="card"><h3>Atlas gallery entries</h3><pre>${JSON.stringify(model.recent_atlas_gallery_entries, null, 2)}</pre></div>
  <div class="card"><h3>Storyboard timelines</h3><pre>${JSON.stringify(model.storyboard_timelines, null, 2)}</pre></div>
  <div class="card"><h3>Longitudinal snapshot</h3><pre>${JSON.stringify(model.longitudinal_snapshot, null, 2)}</pre></div>
  <div class="card"><h3>Route target mode counts</h3><pre>${JSON.stringify(model.route_target_mode_counts, null, 2)}</pre></div>
  <div class="card"><h3>Search results</h3><pre>${JSON.stringify(model.results, null, 2)}</pre></div>
</div>`;
</script>
</body>
</html>
