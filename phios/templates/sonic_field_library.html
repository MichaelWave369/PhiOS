<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>PhiOS Field Library</title>
<style>body{font-family:system-ui;background:#0b1221;color:#eaf0ff;padding:1rem}.card{border:1px solid #334;background:#121c34;border-radius:10px;padding:.8rem;margin:.6rem 0}pre{white-space:pre-wrap;word-break:break-word;font-size:.85rem}.muted{color:#b6c0e0}</style>
</head><body><h1>Field Library (Experimental)</h1><div id="app"></div>
<script>
const model=__PHIOS_FIELD_LIBRARY_MODEL_JSON__;
const app=document.getElementById('app');
app.innerHTML=`<div class="card"><h2>Framing</h2><p class="muted">Theoretical C*=${model.framing.c_star_theoretical}; bio target=${model.framing.bio_target} (${model.framing.bio_status}); Hunter's C=${model.framing.hunter_c_status}. Field libraries are local interpretive curation layers and do not alter PhiKernel truth logic.</p></div>
<div class="card"><h3>Library</h3><pre>${JSON.stringify({name:model.library_name,title:model.title,summary:model.summary,tags:model.tags,filters:model.filters},null,2)}</pre></div>
<div class="card"><h3>Field Library Summary</h3><pre>${JSON.stringify(model.field_library_summary,null,2)}</pre></div>
<div class="card"><h3>Curated Index</h3><pre>${JSON.stringify(model.curated_index,null,2)}</pre></div>
<div class="card"><h3>Collections</h3><pre>${JSON.stringify(model.collections,null,2)}</pre></div>`;
</script></body></html>
